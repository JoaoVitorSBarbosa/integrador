[env:esp32-s3-n16r8v]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; --- Memória e Flash ---
board_build.arduino.memory_type = qio_opi
board_build.f_flash             = 80000000L
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_build.partitions          = partitions.csv
board_build.filesystem          = littlefs

; --- Comunicação ---
monitor_speed = 115200
upload_speed  = 921600

; --- Bibliotecas ---
lib_deps =
    tdk-invensense/ICM42670P @ ^1.0.0

; --- Flags de compilação ---
build_flags =
    ; PSRAM Octal SPI (N16R8)
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    ; CPU 240MHz
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=1
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ=240
    ; Otimização
    -O2
    -DCORE_DEBUG_LEVEL=1
    ; Desabilitar rádios (sem interrupção no loop de controle)
    -DCONFIG_BT_ENABLED=0
    -DCONFIG_ESP32_WIFI_ENABLED=0